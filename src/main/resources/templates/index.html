<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promally - 賃貸管理アプリ</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h1 class="text-center mb-4 fw-bold text-dark">Promally</h1>
                        <p class="text-center text-muted mb-4">賃貸管理アプリ</p>
                        
                        <div class="alert alert-info border-start border-primary border-4 mb-4">
                            <p class="mb-0 fw-medium" th:text="${message}"></p>
                        </div>
                        
                        <!-- メニューリンク -->
                        <div class="d-grid gap-3">
                            <a href="/properties" class="btn btn-primary btn-lg">
                                物件管理
                            </a>
                            <div class="text-center">
                                <small class="text-muted">物件の登録・編集・検索ができます</small>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <small class="text-muted">Powered by Spring Boot & Bootstrap</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
