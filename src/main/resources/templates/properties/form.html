<!DOCTYPE html>
<html lang="ja" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${property.id != null} ? '物件編集' : '新規物件登録'">物件登録 - Promally</title>
    <link href="https://unpkg.com/tailwindcss@^3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- ヘッダー -->
        <div class="mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-gray-800" th:text="${property.id != null} ? '物件編集' : '新規物件登録'"></h1>
                <a href="/properties" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition duration-200">
                    一覧に戻る
                </a>
            </div>
        </div>

        <!-- フォーム -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <form th:action="@{/properties/save}" method="post" th:object="${property}">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{createdAt}" />
                <input type="hidden" th:field="*{updatedAt}" />
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- 左側の列 -->
                    <div class="space-y-6">
                        <h2 class="text-xl font-semibold text-gray-800">基本情報</h2>
                        
                        <!-- 物件名 -->
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                                物件名 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="name" th:field="*{name}" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: サンプル戸建A">
                        </div>

                        <!-- 住所 -->
                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700 mb-1">
                                住所 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="address" th:field="*{address}" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: 東京都世田谷区桜丘1-1-1">
                        </div>

                        <!-- ステータス -->
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">
                                ステータス <span class="text-red-500">*</span>
                            </label>
                            <select id="status" th:field="*{status}" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">選択してください</option>
                                <option th:each="status : ${statuses}" 
                                        th:value="${status}" 
                                        th:text="${status.displayName}"></option>
                            </select>
                        </div>

                        <!-- 賃料 -->
                        <div>
                            <label for="rent" class="block text-sm font-medium text-gray-700 mb-1">賃料（円）</label>
                            <input type="number" id="rent" th:field="*{rent}" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: 150000">
                        </div>

                        <!-- 面積 -->
                        <div>
                            <label for="area" class="block text-sm font-medium text-gray-700 mb-1">面積（㎡）</label>
                            <input type="number" id="area" th:field="*{area}" min="0" step="0.01"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: 85.50">
                        </div>
                    </div>

                    <!-- 右側の列 -->
                    <div class="space-y-6">
                        <h2 class="text-xl font-semibold text-gray-800">詳細情報</h2>
                        
                        <!-- 築年数 -->
                        <div>
                            <label for="buildingAge" class="block text-sm font-medium text-gray-700 mb-1">築年数</label>
                            <input type="number" id="buildingAge" th:field="*{buildingAge}" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: 15">
                        </div>

                        <!-- 間取り -->
                        <div>
                            <label for="layout" class="block text-sm font-medium text-gray-700 mb-1">間取り</label>
                            <input type="text" id="layout" th:field="*{layout}"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="例: 3LDK">
                        </div>

                        <!-- 説明・備考 -->
                        <div>
                            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">説明・備考</label>
                            <textarea id="description" th:field="*{description}" rows="8"
                                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                      placeholder="物件の詳細な説明や特徴、周辺環境などを入力してください..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- ボタン -->
                <div class="mt-8 pt-6 border-t border-gray-200">
                    <div class="flex justify-end space-x-4">
                        <a href="/properties" 
                           class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition duration-200">
                            キャンセル
                        </a>
                        <button type="submit" 
                                class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition duration-200">
                            <span th:text="${property.id != null} ? '更新' : '登録'"></span>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- 注意事項 -->
        <div class="mt-6 bg-blue-50 border-l-4 border-blue-400 p-4 rounded">
            <div class="flex">
                <div class="ml-3">
                    <p class="text-sm text-blue-800">
                        <span class="text-red-500">*</span> マークの付いた項目は必須入力です。
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
